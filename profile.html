<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>XERA | Tracez votre progression</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
        <!-- Web icon and branding -->
        <link rel="icon" type="image/svg+xml" href="icons/logo.png" />
        <link rel="shortcut icon" href="icons/logo.png" />
        <meta name="theme-color" content="#050505" />
        <meta
            name="description"
            content="XERA - Plateforme de suivi de progression transparente sans dopamine sociale"
        />
        <!-- Styles globaux -->
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/search-notification.css" />
        <link rel="stylesheet" href="css/arcs.css" />
        <link rel="stylesheet" href="css/streaming-analytics.css" />
        <link id="monetization-css" rel="stylesheet" href="css/monetization.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <!-- Supabase JS -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
    <body class="profile-open has-mobile-nav">
        <!-- Container pour les notifications Toast -->
        <div id="toast-container"></div>

        <!-- Overlay Immersif -->
        <div id="immersive-overlay">
            <!-- Contenu injecté dynamiquement -->
        </div>

        <!-- Modale Réglages -->
        <div id="settings-modal">
            <div class="settings-container">
                <!-- Contenu injecté dynamiquement -->
            </div>
        </div>

        <!-- Modale Création -->
        <div id="create-modal">
            <div class="create-container">
                <!-- Contenu injecté dynamiquement -->
            </div>
        </div>

        <!-- Panneau de Notifications -->
        <div id="notification-panel" class="notification-panel">
            <div class="notification-panel-header">
                <h3 class="notification-panel-title">Notifications</h3>
                <span
                    class="notification-mark-all"
                    onclick="markAllNotificationsAsRead()"
                    >Tout marquer comme lu</span
                >
            </div>
            <div id="notification-list" class="notification-list">
                <!-- Notifications injectées dynamiquement -->
            </div>
        </div>

        <nav>
            <a
                class="logo"
                onclick="navigateTo('discover')"
                style="cursor: pointer"
            >
                <div class="logo-img">
                    <img src="icons/logo.png" alt="XERA - Logo" />
                </div>
                <span>XΞRA</span>
            </a>
            <div class="nav-links">
                <a
                    id="nav-discover"
                    class="notification-button nav-discover-btn"
                    onclick="navigateTo('discover')"
                    title="Discover"
                    aria-label="Discover"
                >
                    <svg
                        class="notification-icon nav-discover-icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M3 10.5L12 3l9 7.5"></path>
                        <path d="M5 10v10h14V10"></path>
                        <path d="M9 20v-6h6v6"></path>
                    </svg>
                </a>
                <div
                    class="notification-button profile-nav-button"
                    onclick="handleProfileNavigation()"
                    id="nav-profile"
                    title="My Trajectory"
                    aria-label="My Trajectory"
                    role="button"
                >
                    <img
                        id="nav-profile-avatar"
                        class="notification-icon profile-nav-avatar"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><rect width='40' height='40' rx='20' fill='%231f2937'/><circle cx='20' cy='16' r='6' fill='%23e5e7eb'/><path d='M8%2034c2.5-6%208-9%2012-9s9.5%203%2012%209' fill='%23e5e7eb'/></svg>"
                        alt="Avatar utilisateur"
                    />
                </div>
                <div
                    class="notification-button messages-nav-button"
                    onclick="openMessagesPage()"
                    style="display: none"
                    id="messages-nav-btn"
                    title="Messages"
                >
                    <img
                        src="icons/message.svg"
                        alt="Messages"
                        class="notification-icon"
                    />
                    <span
                        id="messages-nav-badge"
                        class="notification-badge"
                    ></span>
                </div>
                <!-- Bouton Notifications -->
                <div
                    class="notification-button"
                    onclick="toggleNotificationPanel()"
                    style="display: none"
                    id="notification-btn"
                >
                    <svg
                        class="notification-icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path
                            d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
                        ></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span
                        id="notification-badge"
                        class="notification-badge"
                    ></span>
                </div>

                <a href="login.html" id="nav-auth" data-i18n="navAuth">Login / Register</a>
            </div>
        </nav>

        <!-- BOUTON RÉGLAGES (FIXED POSITION) -->
        <div id="settings-button-container"></div>

        <!-- PROFIL (TIMELINE) -->
        <section id="profile" class="page active">
            <div class="container profile-container">
                <!-- Contenu injecté dynamiquement -->
            </div>
        </section>

        <!-- MESSAGES -->
        <section id="messages" class="page">
            <div class="container">
                <div class="messages-mount">
                    <!-- Messagerie injectée dynamiquement -->
                </div>
            </div>
        </section>


        <!-- Configuration Supabase -->
        <script src="js/supabase-config.js"></script>
        <script src="js/monetization.js"></script>
        <script src="js/monetization-ui.js"></script>
        <!-- Config push (clé publique VAPID) -->
        <script src="js/push-config.js"></script>
        <script src="js/influence.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script src="js/analytics.js"></script>
        <!-- Améliorations UX -->
        <script src="js/ux-enhancements.js"></script>
        <script src="js/app-enhancements.js"></script>
        <!-- Modules de fonctionnalités -->
        <script src="js/search.js"></script>
        <script src="js/notifications.js"></script>
        <script src="js/messages.js"></script>
        <script src="js/file-upload.js"></script>
        <script src="js/arcs.js"></script>
        <!-- Script principal avec intégration Supabase -->
        <script src="js/app-supabase.js"></script>

        <script>
            // Initialiser les fonctionnalités au chargement
            document.addEventListener("DOMContentLoaded", function () {
                // Initialiser la recherche
                initializeSearch();

                // Initialiser les notifications si l'utilisateur est connecté
                if (currentUser) {
                    initializeNotifications();
                    document.getElementById("notification-btn").style.display =
                        "flex";
                }
            });
        </script>
    </body>
</html>
