<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement abonnement - XERA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/monetization.css">
    <link rel="stylesheet" href="css/search-notification.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="plans-page payment-page" data-api-base="">
    <div class="app-container">
        <nav>
            <a class="logo" href="index.html">
                <div class="logo-img">
                    <img src="icons/logo.png" alt="XERA - Logo" />
                </div>
                <span>XΞRA</span>
            </a>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
                <a href="creator-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            </div>
            <div class="nav-actions">
                <a
                    class="notification-button profile-nav-button"
                    href="profile.html"
                    title="Profil"
                    aria-label="Profil"
                >
                    <img
                        id="navAvatar"
                        class="notification-icon profile-nav-avatar"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><rect width='40' height='40' rx='20' fill='%231f2937'/><circle cx='20' cy='16' r='6' fill='%23e5e7eb'/><path d='M8%2034c2.5-6%208-9%2012-9s9.5%203%2012%209' fill='%23e5e7eb'/></svg>"
                        alt="Avatar utilisateur"
                    />
                </a>
            </div>
        </nav>

        <main class="payment-shell">
            <section class="payment-summary">
                <div class="summary-card">
                    <div class="summary-header">
                        <span class="summary-label">Plan choisi</span>
                        <span class="summary-pill" id="summaryCycle">Mensuel</span>
                    </div>
                    <h1 id="summaryPlan">Standard</h1>
                    <p class="summary-sub">Active ton badge et débloque les avantages.</p>
                    <div class="summary-price">
                        <span id="summaryAmount">$2.99</span>
                        <small id="summaryPeriod">/mois</small>
                    </div>
                    <div class="summary-note" id="summaryNote">Facturation mensuelle, résiliable à tout moment.</div>
                    <div class="summary-features" id="summaryFeatures"></div>
                </div>
            </section>

            <section class="payment-form">
                <div class="payment-card">
                    <div class="payment-card-head">
                        <h2>Choisis ton moyen de paiement</h2>
                        <p>Sélectionne carte ou mobile money, puis la devise.</p>
                    </div>

                    <form id="maishapay-form" method="POST">
                        <input type="hidden" name="plan" id="inputPlan">
                        <input type="hidden" name="billing_cycle" id="inputCycle">
                        <input type="hidden" name="currency" id="inputCurrency" value="USD">
                        <input type="hidden" name="method" id="inputMethod" value="card">
                        <input type="hidden" name="provider" id="inputProvider">
                        <input type="hidden" name="wallet_id" id="inputWallet">
                        <input type="hidden" name="user_id" id="inputUserId">
                        <input type="hidden" name="access_token" id="inputAccessToken">

                        <div class="payment-methods">
                            <button type="button" class="method-card is-active" data-method="card">
                                <div class="method-icon"><i class="fas fa-credit-card"></i></div>
                                <div>
                                    <div class="method-title">Carte bancaire</div>
                                    <div class="method-sub">Visa, Mastercard</div>
                                </div>
                            </button>
                            <button type="button" class="method-card" data-method="mobilemoney">
                                <div class="method-icon"><i class="fas fa-mobile-screen"></i></div>
                                <div>
                                    <div class="method-title">Mobile Money</div>
                                    <div class="method-sub">M-Pesa, Airtel, Orange</div>
                                </div>
                            </button>
                        </div>

                        <div class="currency-select">
                            <label>Devise</label>
                            <div class="currency-buttons">
                                <button type="button" class="currency-btn is-active" data-currency="USD">USD</button>
                                <button type="button" class="currency-btn" data-currency="CDF">CDF</button>
                            </div>
                        </div>

                        <div class="mobile-money-fields" id="mobileMoneyFields">
                            <label>Opérateur</label>
                            <select id="providerSelect">
                                <option value="">Sélectionner</option>
                                <option value="MPESA">M-Pesa</option>
                                <option value="ORANGE">Orange Money</option>
                                <option value="AIRTEL">Airtel Money</option>
                            </select>

                            <label>Téléphone Mobile Money</label>
                            <input id="walletInput" type="tel" placeholder="+243 81 000 0000">
                        </div>

                        <div class="payment-actions">
                            <div class="payment-hint">
                                <i class="fas fa-lock"></i>
                                Paiement sécurisé via MaishaPay
                            </div>
                            <button type="submit" class="btn-primary btn-pay" id="payButton">
                                Continuer vers le paiement
                            </button>
                        </div>
                        <div class="payment-error" id="paymentError"></div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/router.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/monetization.js"></script>
    <script src="js/subscription-payment.js"></script>
</body>
</html>
